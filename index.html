<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta-name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JoinKELF – Kingdom Entrepreneurs & Leadership Fellowship</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- HERO SECTION -->
  <section class="hero">
    <div class="container">
      <h1 id="hero_title"></h1>
      <p id="hero_subtitle"></p>
      <img id="hero_image" alt="" />
    </div>
  </section>

  <!-- ABOUT SECTION -->
  <section class="about">
    <div class="container">
      <h2 id="about_title"></h2>
      <div id="about_body"></div>
      <img id="about_image" alt="" />
    </div>
  </section>

  <!-- BENEFITS SECTION -->
  <section class="benefits">
    <div class="container">
      <div class="benefit">
        <h3 id="b1_title"></h3>
        <p id="b1_body"></p>
        <img id="b1_image" alt="" />
      </div>

      <div class="benefit">
        <h3 id="b2_title"></h3>
        <p id="b2_body"></p>
        <img id="b2_image" alt="" />
      </div>

      <div class="benefit">
        <h3 id="b3_title"></h3>
        <p id="b3_body"></p>
        <img id="b3_image" alt="" />
      </div>
    </div>
  </section>

  <!-- JOIN SECTION -->
  <section class="join">
    <div class="container">
      <h2 id="join_title"></h2>
      <div id="join_description"></div>
      <p id="join_note"></p>

      <form class="join-form">
        <input type="text" placeholder="Your Name" required />
        <input type="email" placeholder="Email Address" required />
        <button type="submit">Request to Join</button>
      </form>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
